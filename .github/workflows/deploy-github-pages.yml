name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - MFUS-1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mfultiscore-app/package-lock.json

      - name: Install and build
        working-directory: mfultiscore-app
        run: |
          npm ci
          npm run build:github

      - name: Deploy built app to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mfultiscore-app/out
